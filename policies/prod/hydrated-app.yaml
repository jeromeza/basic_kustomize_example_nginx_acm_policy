apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  namespace: jerome-prod
spec:
  ports:
  - name: http-port
    port: 80
    targetPort: 8080
  selector:
    app: nginx
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-server
  namespace: jerome-prod
spec:
  replicas: 5
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - image: nginxinc/nginx-unprivileged:stable-alpine
        name: nginx
        ports:
        - containerPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: nginx-route
  namespace: jerome-prod
spec:
  port:
    targetPort: http-port
  to:
    kind: Service
    name: nginx-service
    weight: 100
